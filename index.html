<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="2; url=https://www.minoruosawa.com/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://www.minoruosawa.com/">
  <title>Website moved</title>
  <style>
    body {
      max-width: 420px;
      margin: 5rem auto;
      padding: 0 1.5rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      color: #222;
      text-align:center; 
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.8rem;
      font-weight: 600;
      color: #c53d43; 
    }
    p {
      margin: 0.5rem 0;
    }
    a {
      color: inherit;
    }
    .spinner {
      margin: 3rem auto; 
      width: 24px;
      height: 24px;
      border: 3px solid rgba(0, 0, 0, 0.15);
      border-top-color: rgba(0, 0, 0, 0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HCEG8X3DQT"></script>
  <script>
    const isInternal = localStorage.getItem("osawa.analytics.ga4.optout") === "1";
  
    if (!isInternal) {
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-HCEG8X3DQT');
    }
  </script>
  <script>
    setTimeout(() => {
      location.replace("https://www.minoruosawa.com" + location.pathname + location.search + location.hash);
    }, 5000);
  </script>
</head>
<body>
  <h1>Website moved</h1>
  <p>
    New address: 
    <a href="https://www.minoruosawa.com/">www.minoruosawa.com</a>.
  </p>
  <p>
    You will be redirected automatically in a moment.&nbsp;
  </p>
  <p>
    サイトを移動しました．まもなく自動で転送されます．
  </p>
  <div class="spinner"></div>
</body>
</html>
