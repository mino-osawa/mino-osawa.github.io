<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="2; url=https://www.minoruosawa.com/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://www.minoruosawa.com/">
  <title>Website moved</title>
  <style>
    body {
      max-width: 680px;
      margin: 12vh auto;
      padding: 0 1.5rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      color: #222;
    }
    h1 {
      font-size: 1.3rem;
      margin-bottom: 0.8rem;
      font-weight: 600;
    }
    p {
      margin: 0.5rem 0;
    }
    a {
      color: inherit;
    }
  </style>
  <script>
    setTimeout(() => {
      location.replace("https://www.minoruosawa.com" + location.pathname + location.search + location.hash);
    }, 5000);
  </script>
</head>
<body>
  <h1>Website moved</h1>
  <p>
    This website has moved to
    <a href="https://www.minoruosawa.com/">www.minoruosawa.com</a>.
  </p>
  <p>
    You will be redirected automatically in a moment.
    Please update your bookmark if needed.
  </p>
</body>
</html>
